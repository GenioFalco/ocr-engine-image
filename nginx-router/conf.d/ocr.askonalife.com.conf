server {
    listen 80;
    server_name ocr.askonalife.com;

    # API трафик: перенаправляем на порт 8000, где запущен ocr_engine
    location /api/ {
        proxy_pass http://host.docker.internal:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;

        # Увеличенные таймауты: LLM обработка документа может занять 2-3 мин
        proxy_connect_timeout  10s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
    }

    # SAML эндпоинты — напрямую на бэкенд (AD FS редиректит на эти URLs)
    location /auth/saml/ {
        proxy_pass http://host.docker.internal:8000/auth/saml/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend трафик: перенаправляем на порт фронтенда
    location / {
        # Замените 5173 на порт, который вы в итоге выберете для фронтенда в вашем основном проекте
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        
        # Заголовки для HMR и WebSocket (если используется npm run dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
