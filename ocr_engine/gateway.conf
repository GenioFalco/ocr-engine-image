server {
    listen 80;
    server_name ocr.askonalife.com;

    # Для получения бесплатного SSL (certbot / acme.sh)
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
        allow all;
    }

    # API трафик: перенаправляем на backend контейнер
    location /api/ {
        proxy_pass http://ocr_engine:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Разрешаем загрузку сканов большого размера
        client_max_body_size 50M;
    }

    # Frontend трафик: перенаправляем на статический контейнер React
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

