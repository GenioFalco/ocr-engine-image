server {
    listen 80;
    server_name ocr.askonalife.com;

    # Специальный путь для проверки домена при выдаче SSL от acme.sh
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
        allow all;
    }

    # Проксируем API запросы на Python Backend (порт 8000)
    # Слэш на конце (8000/) отрезает префикс "/api" из запроса, 
    # так как бэкенд FastAPI не ждет /api
    location /api/ {
        proxy_pass http://host.docker.internal:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Разрешаем большие файлы (сканы pdf)
        client_max_body_size 50M;
    }

    # Все остальные запросы проксируем на Vite Frontend (порт 5173)
    location / {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        
        # Эти два заголовка критически важны для работы WebSocket (Vite HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

