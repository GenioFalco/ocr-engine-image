version: '3.8'

services:
  ocr_engine:
    build: .
    # ports убраны для безопасности, доступ только через шлюз
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://ocr_user:ocr_password@db:5432/ocr_db
      - LLM_PROVIDER=gigachat
    depends_on:
      - db
    volumes:
      - .:/app
    networks:
      - ocr_net

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=ocr_user
      - POSTGRES_PASSWORD=ocr_password
      - POSTGRES_DB=ocr_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - ocr_net

  frontend:
    build:
      context: ./frontend
    # ports убраны для безопасности, доступ только через шлюз
    depends_on:
      - ocr_engine
    networks:
      - ocr_net

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./acme-challenge:/var/www/acme-challenge
    depends_on:
      - ocr_engine
      - frontend
    networks:
      - ocr_net

networks:
  ocr_net:
    driver: bridge
    ipam:
      config:
        - subnet: 12.10.1.0/24

volumes:
  postgres_data:
